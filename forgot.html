<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot te Password</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background-color: #ffe6ea;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
    }
    h1 {
      color: darkgoldenrod;
      font-weight: bold;
      font-style: italic;
    }
    .box {
      background-color: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background-color: darkgoldenrod;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: goldenrod;
    }
  </style>
</head>
<body>
  <h1>Forgot Password?</h1>
  <div class="box">
    <p>Enter your email to recover your account.</p>
    <input type="email" placeholder="Your Email" />
    <button onclick="alert('Recovery email will be sent')">Send Reset Link</button>
  </div>
</body>
</html>
