<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background-color: #ffe6ea;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }
    h1 {
      color: darkgoldenrod;
      font-weight: bold;
      font-style: italic;
      font-size: 2.5rem;
    }
    p {
      font-size: 1.2rem;
      margin-top: 15px;
      color: #555;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 10px;
      background-color: darkgoldenrod;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: goldenrod;
    }
  </style>
</head>
<body>
  <h1>🎉 Welcome to Your Dashboard!</h1>
  <p>You’re logged in, enjoy the system.</p>
  <button onclick="window.location.href='index.html'">Log Out</button>
</body>
</html>
